[backdrop]
enabled = true

[bar.default]
background_opacity = 0.84999998100101948
border = "primary"
end = [
    "tray",
    "notifications",
    "clipboard",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center",
    "session"
]
margin_edge = 5.0
margin_ends = 5.0
scale = 1.05
start = [ "launcher", "wallpaper", "workspaces", "spac", "audio_visualizer", "media" ]
thickness = 40

[dock]
active_monitor_only = true
auto_hide = true
background_opacity = 0.84999998100101948
enabled = true
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 90

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 600

    [idle.behavior.suspend]
    action = "suspend"
    enabled = true
    lock_before_suspend = true
    timeout = 1800

[notification]
background_opacity = 0.84999999999999998

[osd]
background_opacity = 0.84999999999999998

[shell]
avatar_path = "~/.config/noctalia/avatar.png"
font_family = "Geist"
niri_overview_type_to_launch_enabled = true
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = false
time_format = "{:%-I:%M %p}"

    [shell.panel]
    session_placement = "centered"
    transparency_mode = "glass"

[theme]
builtin = "Dracula"
community_palette = "Shien"
custom_palette = "FracturedStack"
source = "custom"

    [theme.templates]
    builtin_ids = [ "btop", "gtk3", "gtk4", "ghostty", "niri" ]
    community_ids = [ "yazi" ]

[wallpaper]
directory = "~/.config/noctalia/wallpapers/"

    [wallpaper.default]
    path = "/etc/nixos/dotfiles/noctaliaV5/wallpapers/wallpaperflare.com_wallpaper (1).jpg"

    [wallpaper.last]
    path = "/etc/nixos/dotfiles/noctaliaV5/wallpapers/wallpaperflare.com_wallpaper (1).jpg"

    [wallpaper.monitors.eDP-1]
    path = "/etc/nixos/dotfiles/noctaliaV5/wallpapers/wallpaperflare.com_wallpaper (1).jpg"

[weather]
auto_locate = true
unit = "imperial"

[widget.bongocat]
input_device = ""
script = "scripts/bongocat.lua"
type = "scripted"

[widget.brightness]
show_label = false

[widget.clock]
format = "{:%-I:%M %p}"

[widget.media]
hide_when_no_media = true
max_length = 300.0

[widget.network]
show_label = false

[widget.spac]
length = 100.0
type = "spacer"

[widget.volume]
show_label = false
